    <style>
        .uangdiv {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .uangdiv.hilang {
            display: none;
        }

        .beri {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
            margin-bottom: 20px;
        }

        .laybox {
            display: flex;
        }

        .uangcard {
            max-width: 150px;
            cursor: pointer;
            transition: 0.3s;
        }

        .uangcard:active {
            transform: scale(0.9);
        }

        .layuang {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
        }

        .boxuang {
            display: flex;
            flex-wrap: wrap;
            align-items: top;
            gap: 12px;
        }

        .boxuang>* {
            flex-shrink: 0;
            flex-grow: 0;
        }

        .layuang.hilang {
            display: none;
        }
    </style>
</head>

    <main>
        <h1>Beri Uang</h1>
        <div class="submenu">
            <div class="leveldiv">
                <label for="level">🚀Level</label>
                <select name="level" id="level">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                </select>
            </div>
            <div id="info-skor">🎯Skor: 0</div>
        </div>
        <div class="main-content">

            <div class="soal-teks"></div>
            <div class="uangplus">
            </div>
            <div class="dflex"><button id="next" class="btn btn-primary">Mulai Berlatih</button></div>



            <div class="response hilang">👎🏻 salah</div>

            <div class="layuang hilang"></div>
            <div class="beri">
                <button id="btnberi" class="btn hilang">Berikan</button>

    <script src="script.js"></script>
    <script>
        const next = document.getElementById('next')
        const uang = { 1000: '1ribu', 2000: '2ribu', 5000: '5ribu', 10000: '10ribu', 20000: '20ribu', 50000: '50ribu', 100000: '100ribu' }

        uangArray = [1000, 2000, 5000, 10000, 20000, 50000, 100000]
        const levelData = {
            1: [2000, 3000, 4000, 6000, 7000, 8000],
            2: [9000, 10000, 11000, 12000, 13000, 14000],
            3: [15000, 16000, 17000, 18000, 19000, 20000],
            4: [50000, 60000, 70000, 80000, 90000, 150000]
        };
        let index = 0
        const emoji = document.querySelector('.soal-emoji')
        const soalteks = document.querySelector(".soal-teks")
        const pilihan = document.querySelector(".pilihan")
        const infoSkor = document.getElementById("info-skor")
        const response = document.querySelector(".response")
        const layuang = document.querySelector(".layuang")
        const laybox = document.querySelector(".laybox")
        const boxuang = document.querySelector(".boxuang")
        const uangplus = document.querySelector(".uangplus")
        const level = document.getElementById("level")
        const btnberi = document.getElementById("btnberi")

        let skor = 0
        let curlevel = 1
        let soal_acak = []
        let index_soal = 0
        //const tingkat = document.querySelector('#tingkat')


        level.addEventListener("change", e => {
            index_soal = 0;
            next.classList.remove('hilang')
            boxuang.innerHTML = ""
            pilihan.innerHTML = ""
            layuang.innerHTML = ""
            soalteks.innerHTML = ""
            btnberi.classList.add("hilang")
            laybox.classList.add("hilang")
            next.textContent = "level " + level.value
            console.log(level.value)
        })
        layuang.addEventListener("click", e => {
            const box = e.target.closest(".uangcard");
            if (!box) return; // bukan klik emoji-box
            boxuang.appendChild(e.target.cloneNode())
            box.classList.toggle("transparan")
        })
        boxuang.addEventListener('click', (e) => {
            if (e.target.tagName === 'IMG') {
                boxuang.removeChild(e.target)
            }
        })
        //buahan.addEventListener('click', (e) => {
        //   if(e.target.tagName === 'IMG'){
        //     const pilihan = parseInt(e.target.dataset.nominal)
        //   const benar = soal_acak[index_soal-1]
        // boxuang.appendChild(e.target.cloneNode())
        //}
        //})

        function cekLevel(lev) {
            let temp = levelData[lev] || [];
            return shuffleArray(temp)
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                // Tukar elemen
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        async function cekJawaban(pilih, benar) {
            console.log(pilih, benar)
            if (pilih === benar) {
                index_soal++
                skor++
                infoSkor.innerHTML = `🎯Skor: ${skor}`
                //document.querySelector(".skor").textContent = `🎯skor: ${skor}`
                //await delay(300);
                layuang.classList.add("hilang")
                btnberi.classList.add("hilang")
                boxuang.innerHTML = ''
                soalteks.innerHTML = ''
                pilihan.classList.add("hilang")
                response.innerHTML = "👍🏻Benar"
                response.classList.remove("hilang")
                await speak(`hebat, jawaban kamu benar`)
                btnberi.classList.remove("hilang")
                response.classList.add("hilang")
                next.click()
            }
            else {
                //await delay(300);
                layuang.classList.add("hilang")
                laybox.classList.add("hilang")
                pilihan.classList.add("hilang")
                soalteks.classList.add("hilang")
                boxuang.innerHTML = ''
                response.innerHTML = "👎🏻Salah"
                response.classList.remove("hilang")
                btnberi.classList.add("hilang")
                await speak("Jawaban salah, coba lagi!")
                soalteks.classList.remove("hilang")
                btnberi.classList.remove("hilang")
                response.classList.add("hilang")
                layuang.classList.remove("hilang")
                pilihan.classList.remove("hilang")
                laybox.classList.remove("hilang")



            }

        }

        function cekLevel(lev) {
            let temp = levelData[lev] || [];
            return shuffleArray(temp)
        }


        function speak(text) {
            return new Promise((resolve) => {
                const u = new SpeechSynthesisUtterance(text);
                u.lang = "id-ID";
                u.rate = 1;
                u.pitch = 1;
                u.volume = 1;

                u.onend = () => {
                    resolve(); // selesai berbicara
                };

                speechSynthesis.cancel();
                speechSynthesis.speak(u);
            });
        }
        next.addEventListener('click', e => {
            if (index_soal == 0) {
                curlevel = level.value
                soal_acak = cekLevel(curlevel)
                layuang.classList.remove('hilang')
                laybox.classList.remove("hilang")
                btnberi.classList.remove("hilang")
            }
            if (index_soal < soal_acak.length) {
                btnberi.classList.remove("hilang")
                soalteks.classList.remove("hilang")
                next.classList.add('hilang')
                laybox.classList.remove('hilang')
                layuang.classList.remove("hilang")
                const soaltampil = soal_acak[index_soal]
                console.log(soaltampil)

                //let jumlah = soaltampil.reduce((a, b) => a + b, 0);
                //console.log(jumlah)
                let tampilan = ""
                tampiluang(uangArray)

                //tampilan=`<div class="kiri" style="font-size:40px;padding-right:9px;">${soaltampil[0]}</div><div style="text-align:center;font-size:40px"> - </div><div class="kanan" style="font-size:40px;padding-left:9px;"> ${soaltampil[1]} =</div><div style="grid-column: 1 / -1;display:flex;justify-content:center;font-size:3rem;">${tampilanBuahmin(soaltampil[0],soaltampil[1])}</div>`
                soalteks.innerHTML = `<p data-pertanyaan="${soaltampil}">${soaltampil}</p>`
                speak(`berikanlah uang sebanyak ${soaltampil} kepada anak tersebut`)
                //laytambah.innerHTML = tampilan


                //index_soal++
            }
            else {
                index_soal = 0
                curlevel++
                level.value = curlevel
                next.classList.remove('hilang')
                next.textContent = "level " + level.value
                pilihan.innerHTML = ""
                if (curlevel > Object.keys(levelData).length) {
                    next.textContent = 'Selesai'
                    btnberi.classList.add("hilang")
                    setTimeout(() => {
                        speak("Selamat Anda telah menyelesaikan semua level, terima kasih telah bermain!")
                    }, 1000);
                } else {
                    speak(`Selamat Anda naik ke level ${curlevel}, ayo kita lanjutkan permainannya!`)
                }
            }
        })

        btnberi.addEventListener('click', () => {
            const pilihan = boxuang.querySelectorAll('img')

            let total = 0
            pilihan.forEach(el => {
                total += parseInt(el.dataset.nominal)

            })
            console.log(total)
            const benar = parseInt(soalteks.children[0].dataset.pertanyaan)
            console.log(`benar =${benar}`)
            cekJawaban(total, benar)
        })
        function tampiluang(arr) {
            layuang.innerHTML = ""
            arr.forEach(a => {
                const img = document.createElement("img")
                img.src = `uang/${uang[a]}.jpg`
                img.dataset.nominal = a
                img.classList.add('uangcard')
                img.style.width = 150 + 'px'
                layuang.appendChild(img)
            })
        }

        speak("Halo ibrahim abdulah haris. mari kita bermain menjumlahkan uang, silahkan klik tombol mulai untuk memulai permainan")
    </script>
