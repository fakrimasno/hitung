    <script>
        const next = document.getElementById('next')
        const uang = { 1000: '1ribu', 2000: '2ribu',5000: '5ribu', 10000: '10ribu', 20000: '20ribu', 50000: '50ribu', 100000: '100ribu' }
        
        uangArray = [1000, 2000, 5000, 10000, 20000, 50000, 100000]
        const levelData = {
            1: [[1000, 1000], [2000, 1000], [2000, 2000], [2000, 1000, 1000], [2000, 2000, 1000], [2000, 2000, 2000], [1000, 1000, 1000, 1000], [2000, 1000, 1000, 1000], [2000, 2000, 1000, 1000], [2000, 2000, 2000, 2000]],
            2: [[1000, 1000, 1000, 1000, 1000], [2000, 1000, 1000, 1000, 1000], [2000, 2000, 1000, 1000, 1000], [2000, 2000, 2000, 1000, 1000], [2000, 2000, 2000, 2000, 1000], [2000, 2000, 2000, 2000, 2000], [5000, 1000], [5000, 2000], [5000, 5000], [5000, 2000, 1000]],
            3: [[5000, 5000], [5000, 1000, 1000, 1000], [5000, 2000, 1000], [5000, 2000, 2000, 1000], [5000, 5000, 5000]],
            4: [[10000, 1000], [10000, 2000], [10000, 5000], [10000, 2000, 2000, 1000], [10000, 10000]],
            5: [[10000, 10000], [10000, 10000, 10000], [10000, 10000, 10000, 10000], [10000, 10000, 10000, 10000, 10000], [10000, 10000, 10000, 10000, 5000]],
            6: [[20000, 10000], [20000, 20000], [20000, 20000, 10000], [20000, 20000, 20000], [20000, 20000, 20000, 20000]],
            7: [[20000, 20000, 20000, 20000, 20000], [10000, 10000, 10000, 10000, 10000], [20000, 20000, 20000, 20000, 10000], [5000, 5000], [5000, 5000, 5000, 5000]],
            8: [[50000, 10000], [50000, 20000], [50000, 50000], [50000, 20000, 20000, 10000], [50000, 20000, 10000, 10000, 10000]],
            9: [[50000, 50000], [50000, 50000, 50000], [50000, 50000, 50000, 50000], [50000, 50000, 50000, 50000, 50000], [50000]],
            10: [[100000, 100000], [100000, 100000, 100000], [100000, 100000, 100000, 100000], [100000, 100000, 100000, 100000, 100000], [100000, 50000], [100000, 50000, 50000], [100000, 100000, 50000, 50000]]

        };
        let index = 0
        const emoji = document.querySelector('.soal-emoji')
        const pilihan = document.querySelector(".pilihan")
        const infoSkor = document.getElementById("info-skor")
        const response = document.querySelector(".response")
        const layuang = document.querySelector(".layuang")
        const uangplus = document.querySelector(".uangplus")
        const level = document.getElementById("level")

        let skor = 0
        let curlevel = 1
        let soal_acak = []
        let index_soal = 0
        //const tingkat = document.querySelector('#tingkat')


       level.addEventListener("change", e => {
            index_soal = 0;    
            next.classList.remove('hilang')
            pilihan.innerHTML = ""
            layuang.innerHTML=""
            next.textContent = "level " + level.value
            console.log(level.value)
        })
        layuang.addEventListener("click", e => {
            const box = e.target.closest(".uang-btn");
            if (!box) return; // bukan klik emoji-box
            
            box.classList.toggle("transparan")
        })

        function cekLevel(lev) {
            let temp = levelData[lev] || [];
            return shuffleArray(temp)
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                // Tukar elemen
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        async function cekJawaban(pilih, benar) {
            if (pilih === benar) {
                index_soal++
                skor++
                infoSkor.innerHTML = `🎯Skor: ${skor}`
                //document.querySelector(".skor").textContent = `🎯skor: ${skor}`
                //await delay(300);
                layuang.classList.add("hilang")
                pilihan.classList.add("hilang")
                response.innerHTML = "👍🏻Benar"
                response.classList.remove("hilang")
                await speak(`hebat, jawaban kamu benar`)
                response.classList.add("hilang")
                next.click()
            }
            else {
                //await delay(300);
                layuang.classList.add("hilang")
                pilihan.classList.add("hilang")
                response.innerHTML = "👎🏻Salah"
                response.classList.remove("hilang")
                await speak("Jawaban salah, coba lagi!")
                response.classList.add("hilang")
                layuang.classList.remove("hilang")
                pilihan.classList.remove("hilang")
                


            }

        }

        function cekLevel(lev) {
            let temp = levelData[lev] || [];
            return shuffleArray(temp)
        }


        function speak(text) {
            return new Promise((resolve) => {
                const u = new SpeechSynthesisUtterance(text);
                u.lang = "id-ID";
                u.rate = 1;
                u.pitch = 1;
                u.volume = 1;

                u.onend = () => {
                    resolve(); // selesai berbicara
                };

                speechSynthesis.cancel();
                speechSynthesis.speak(u);
            });
        }
        next.addEventListener('click', e => {
            if (index_soal == 0) {
                curlevel = level.value
                soal_acak = cekLevel(curlevel)
                layuang.classList.remove('hilang')
                pilihan.classList.remove("hilang")
            }
            if (index_soal < soal_acak.length) {
                next.classList.add('hilang')
                pilihan.classList.remove('hilang')
                layuang.classList.remove("hilang")
                const soaltampil = soal_acak[index_soal]
                
                let jumlah = soaltampil.reduce((a, b) => a + b, 0);
                console.log(jumlah)
                let tampilan=""
                tampiluang(soaltampil)
                
                //tampilan=`<div class="kiri" style="font-size:40px;padding-right:9px;">${soaltampil[0]}</div><div style="text-align:center;font-size:40px"> - </div><div class="kanan" style="font-size:40px;padding-left:9px;"> ${soaltampil[1]} =</div><div style="grid-column: 1 / -1;display:flex;justify-content:center;font-size:3rem;">${tampilanBuahmin(soaltampil[0],soaltampil[1])}</div>`
                
                speak(`berapakah jumlah uang berikut`)
                //laytambah.innerHTML = tampilan
                pilihan.innerHTML = ""
                const pil = [
                    jumlah,
                    jumlah + 1000,
                    jumlah + 2000,
                    jumlah - 1000
                ].sort(() => Math.random() - 0.5);

                pil.forEach(p => {
                    const btn = document.createElement("button");
                    btn.textContent = p;
                    btn.classList.add("btnpilihan")
                    btn.classList.add("btn")

                    btn.onclick = () => {
                        setTimeout(() => {
                            cekJawaban(p, jumlah);
                        }, 200)
                    }
                    pilihan.appendChild(btn);

                })

                index_soal++
            }
            else {
                index_soal = 0
                curlevel++
                level.value = curlevel
                next.classList.remove('hilang')
                next.textContent = "level " + level.value
                pilihan.innerHTML = ""
                if (curlevel > 10) {
                    next.textContent = 'Selesai'
                    setTimeout(() => {
                        speak("Selamat Anda telah menyelesaikan semua level, terima kasih telah bermain!")
                    }, 1000);
                    
                }else{
                    speak(`Selamat Anda naik ke level ${curlevel}, ayo kita lanjutkan permainannya!`)
                }
            }
        })


        function tampiluang(arr){
            layuang.innerHTML=""
            arr.forEach(a=>{
                const img=document.createElement("img")
                img.src=`uang/${uang[a]}.jpg`
                console.log(`uang/${uang[a]}`)
                img.classList.add('uang-btn')
                img.style.width=150+'px'
                layuang.appendChild(img)    
            })
        }

        speak("Halo ibrahim abdulah haris. mari kita bermain menjumlahkan uang, silahkan klik tombol mulai untuk memulai permainan")
    </script>
