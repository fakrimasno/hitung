    <script src="script.js"></script>
    <script>
        const next = document.getElementById('next')
        const uang=[
            {1000:'1ribu'},        
            {2000:'2ribu'},
            {5000:'5ribu'},
            {10000:'10ribu'},
            {20000:'20ribu'},
            {50000:'50ribu'},
            {100000:'100ribu'}
        ]
        uangArray = [1000,2000,5000,10000,20000,50000,100000]
        let index = 0
        const emoji = document.querySelector('.soal-emoji')
        const pilihan = document.querySelector(".pilihan")
        const infoSkor = document.getElementById("info-skor")
        const response =document.querySelector(".response")
        const laytambah=document.querySelector(".laytambah")
        const uangdiv=document.querySelector(".uangdiv")
        
        let skor = 0        
        let curlevel = 1       
        let soal_acak = shuffleArray(uangArray)
        let index_soal = 0
        //const tingkat = document.querySelector('#tingkat')
        

function tungguKlik(element) {
    return new Promise(resolve => {
        element.addEventListener("click", function handler(e) {
            element.removeEventListener("click", handler); // biar hanya 1x
            resolve(e); // kirim event klik
        });
    });
}

async function pilihUang() {
    const semuaUang = document.querySelectorAll(".uang-btn");

    // ubah jadi array promise (semua tombol bisa diklik)
    const promises = [...semuaUang].map(el => tungguKlik(el));

    // tunggu salah satu diklik
    const hasil = await Promise.race(promises);

    const nominal = hasil.target.dataset.nominal;

    return nominal;
}
async function mulaiSoal() {
    uangdiv.classList.remove("hilang")
    next.classList.add("hilang")
    if (index_soal >= soal_acak.length) {
    await speak("selamat kamu telah menyelesaikan permainan ini")
    return;
    

}
    const jawabanBenar = soal_acak[index_soal];

    speak(`manakah uang ${jawabanBenar} rupiah`);

    const pilihanUser = await pilihUang();

    cekJawaban(Number(pilihanUser), jawabanBenar);
}

next.addEventListener("click",mulaiSoal)
     
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                // Tukar elemen
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }


function delay(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}
        

        async function cekJawaban(pilih, benar) {
            if (pilih === benar) {
                index_soal++
                skor++
                infoSkor.innerHTML = `🎯Skor: ${skor}`
                //document.querySelector(".skor").textContent = `🎯skor: ${skor}`
                await delay(300);
                uangdiv.classList.add("hilang")
                response.innerHTML="👍🏻Benar"
                response.classList.remove("hilang")
                await speak(`hebat, jawaban kamu benar`)
                response.classList.add("hilang")                
                next.click()
            }
            else {
                await delay(300);
                uangdiv.classList.add("hilang")
                response.innerHTML="👎🏻Salah"
                response.classList.remove("hilang")
                await speak("Jawaban salah, coba lagi!")
                response.classList.add("hilang")
                await mulaiSoal()
                

            }

        }


        function speak(text) {
            return new Promise((resolve) => {
                const u = new SpeechSynthesisUtterance(text);
                u.lang = "id-ID";
                u.rate = 1;
                u.pitch = 1;
                u.volume = 1;

                u.onend = () => {
                    resolve(); // selesai berbicara
                };

                speechSynthesis.cancel();
                speechSynthesis.speak(u);
            });
        }

        speak("Halo ibrahim abdulah haris. mari kita bermain tebak uang, silahkan klik tombol mulai untuk memulai permainan")
    </script>
