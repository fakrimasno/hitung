    <main>
        <h1>Ayo kita belajar!</h1>
        <div class="submenu">
            <div class="leveldiv">
                <label for="level">🚀Level</label>
                <select name="level" id="level">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                </select>
            </div>
            <div id="info-skor">🎯Skor: 10</div>
        </div>
        <div class="main-content">
            
            <div class="dflex"><button id="next" class="btn btn-primary">Mulai Berlatih</button></div>            
            <div class="response hilang">👎🏻 salah</div>
            <div class="soal-emoji dflex hilang"></div>
            <div class="pilihan dflex hilang">
                <button class="btnpilihan btn">2</button>
                <button class="btnpilihan btn">3</button>
                <button class="btnpilihan btn">4</button>
                <button class="btnpilihan btn">5</button>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
    <script>
        const next = document.getElementById('next')
        
        const level = document.getElementById("level")
        const buah = ["🍎", "🍏", "🍐", "🍊", "🍋", "🍌", "🍉", "🍓", "🥭", "🍍", "🥝", "🍅"]
        const emoji = document.querySelector('.soal-emoji')
        const pilihan = document.querySelector(".pilihan")
        const infoSkor = document.getElementById("info-skor")
        const response =document.querySelector(".response")
        let index = 0
        let skor = 0
        let level_1 = [2, 3, 4, 5, 6, 7]
        let level_2 = [5, 6, 7, 8, 9, 10]
        let level_3 = [8, 9, 10, 11, 12, 13]
        let level_4 = [10, 11, 12, 13, 14, 15]
        let soal_acak = []
        let index_soal = 0
        let curlevel = 1

        next.addEventListener('click', e => {
            if (index_soal == 0) {
                curlevel = level.value
                soal_acak = cekLevel(curlevel)
                emoji.classList.remove("hilang")
                pilihan.classList.remove("hilang")
            }
            if (index_soal < soal_acak.length) {
                next.classList.add('hilang')
                speak("Hitunglah jumlah buah berikut ini!")
                const jumlah = soal_acak[index_soal]
                
                const tampilan = tampilanBuah(jumlah)
                emoji.innerHTML = `<div><div style="font-size:1.5rem;text-align:center;">Hitunglah jumlah buah berikut ini!</div><div style="display:flex;flex-wrap:wrap; font-size:2.5rem;justify-content:center;">${tampilan}</div></div>`
                pilihan.innerHTML = ""
                const pil = [
                    jumlah,
                    jumlah + 1,
                    jumlah + 2,
                    jumlah - 1
                ].sort(() => Math.random() - 0.5);

                pil.forEach(p => {
                    const btn = document.createElement("button");
                    btn.textContent = p;
                    btn.classList.add("btnpilihan")
                    btn.classList.add("btn")

                    btn.onclick = () => {
                        setTimeout(() => {
                            cekJawaban(p, jumlah);
                        }, 200)
                    }
                    pilihan.appendChild(btn);

                })

                index_soal++
            }
            else {
                index_soal = 0
                curlevel++
                level.value = curlevel
                next.classList.remove('hilang')
                next.textContent = "level " + level.value
                pilihan.innerHTML = ""
                emoji.classList.add("hilang")
                if (curlevel > 4) {
                    next.textContent = 'Selesai'
                    soal.textContent = 'Selamat Anda Telah Menyelesaikan Semua Level'
                    speak("Selamat Anda telah menyelesaikan semua level, terima kasih telah bermain!")
                }else{
                    speak(`Selamat Anda naik ke level ${curlevel}, ayo kita lanjutkan permainannya!`)

                }
            }
        })

        level.addEventListener("change", e => {
            index_soal = 0;
            next.classList.remove('hilang')
            pilihan.innerHTML = ""
            emoji.classList.add("hilang")
            next.textContent = "level " + level.value
          
        })
        emoji.addEventListener("click", e => {
            const box = e.target.closest(".emoji-box");
            if (!box) return; // bukan klik emoji-box
            box.classList.toggle("transparan")
        })

        function cekLevel(lev) {
            let temp = []
            if (lev == 1) {
                temp = level_1
            } else if (lev == 2) {
                temp = level_2
            } else if (lev == 3) {
                temp = level_3
            } else if (lev == 4) {
                temp = level_4
            }
            return shuffleArray(temp)
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                // Tukar elemen
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }


        function tampilanBuah(jumlah) {
            let tampilan = ""
            let jenis = buah[Math.floor(Math.random() * buah.length)]
            for (let i = 0; i < jumlah; i++) {
                tampilan += `<div class="emoji-box">${jenis}</div>`
            }
            return tampilan

        }


        async function cekJawaban(pilih, benar) {
            if (pilih === benar) {
                emoji.innerHTML = ""
                pilihan.innerHTML = ""
                skor++
                infoSkor.innerHTML = `🎯Skor: ${skor}`
                //document.querySelector(".skor").textContent = `🎯skor: ${skor}`
                response.innerHTML="👍🏻Benar"
                response.classList.remove("hilang")
                await speak(`benar, jawabannya ${benar}`)
                response.classList.add("hilang")
                next.click()
            }
            else {
                emoji.classList.add("hilang")
                pilihan.classList.add("hilang")
                response.innerHTML="👎🏻Salah"
                response.classList.remove("hilang")
                await speak("Jawaban salah, coba lagi!")
                emoji.classList.remove("hilang")
                pilihan.classList.remove("hilang")
                response.classList.add("hilang")

            }

        }


        function speak(text) {
            return new Promise((resolve) => {
                const u = new SpeechSynthesisUtterance(text);
                u.lang = "id-ID";
                u.rate = 1;
                u.pitch = 1;
                u.volume = 1;

                u.onend = () => {
                    resolve(); // selesai berbicara
                };

                speechSynthesis.cancel();
                speechSynthesis.speak(u);
            });
        }

        speak("Halo ibrahim abdulah haris. selamat datang di permainan menghitung, silahkan klik tombol mulai untuk memulai permainan")
    </script>
